spring:
  application:
    name: roomfit-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/roomfit;AUTO_SERVER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: ${PORT:10000}

roomfit:
  client-scope:
    # Header-less RoomPlan/Web clients stay in the legacy scope while they migrate.
    enabled: ${ROOMFIT_CLIENT_SCOPE_ENABLED:true}
    required: ${ROOMFIT_CLIENT_SCOPE_REQUIRED:false}
