spring:
  application:
    name: roomfit-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/roomfit;AUTO_SERVER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: ${PORT:10000}
